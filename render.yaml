databases:
  - name: vault-db
    plan: free
    databaseName: vault

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: vault-api
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vault-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://vault-web.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── React frontend (static site) ────────────────────────────────────────────
  - type: web
    name: vault-web
    runtime: static
    rootDir: .
    buildCommand: npx pnpm@9 install && npx pnpm@9 --filter @vault/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://vault-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
